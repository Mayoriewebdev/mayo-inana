<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">


</head>

<body>



    <section class="mayo-section">

    <div class="mayo-container">

        <!-- Hot Seller -->
        <div class="mayo-badge" data-aos="zoom-in" data-aos-delay="100">
            <img src="images/Hot seller icon.png" alt="Hot Seller">
        </div>

        <!-- Title -->
        <div class="mayo-title" data-aos="fade-up" data-aos-delay="200">
            <img src="images/Inana mayo.png" alt="Inana Mayonnaise">
        </div>

        <!-- Description -->
        <div class="mayo-desc" data-aos="fade-up" data-aos-delay="300">
            <img src="images/Rich text4.png" alt="Mayonnaise description">
        </div>

        <!-- Product Image -->
        <div class="mayo-image" data-aos="zoom-in-up" data-aos-delay="400">
            <img src="images/Mayo image.png" alt="Mayonnaise product">
        </div>

        <!-- Bottom -->
        <div class="mayo-bottom" data-aos="fade-up" data-aos-delay="500">

            <div class="mayo-price">
                <img src="images/Starting text100.png" alt="Starting from 100">
            </div>

            <a href="#" class="mayo-button" data-aos="pulse" data-aos-delay="600">
                <img src="images/Buy now icon.png" alt="Buy Now">
            </a>

        </div>

    </div>

</section>




    
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 900,
            once: true,
            offset: 120,
            easing: "ease-out-cubic"
        });
    </script>

</body>

</html>
